# ─── Redis Stack Modules ──────────────────────────────────────────────────────
# These .so files are bundled inside redis/redis-stack-server image
loadmodule /opt/redis-stack/lib/redisearch.so
loadmodule /opt/redis-stack/lib/rejson.so
loadmodule /opt/redis-stack/lib/redisbloom.so
loadmodule /opt/redis-stack/lib/redistimeseries.so

# ─── Persistence (AOF) ───────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ─── RDB Snapshot (backup safety net) ────────────────────────────────────────
save 900 1
save 300 10
save 60 10000

# ─── Data Directory ──────────────────────────────────────────────────────────
dir /data

# ─── Safety: Disable dangerous commands in local dev ─────────────────────────
# (Commented out so RedisInsight can still flush during dev if needed)
# rename-command FLUSHALL "FLASH_FLUSH_ALL_2026"
# rename-command FLUSHDB  "FLASH_FLUSH_DB_2026"

# ─── Network ─────────────────────────────────────────────────────────────────
protected-mode yes
bind 0.0.0.0
requirepass ${REDIS_PASSWORD}
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ─── Memory ──────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ─── Logging ─────────────────────────────────────────────────────────────────
loglevel notice
